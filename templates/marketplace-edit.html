<form class="sr5-marketplace actor-grid">
  <!-- Header Section -->
  <header class="sr5-marketplace header">
      <div class="sr5-marketplace toggle-container">
          <input class="sr5-marketplace toggle-switch" type="checkbox" id="toggle-edit" name="toggle-edit">
          <label for="toggle-edit" class="sr5-marketplace toggle-label">
              <span class="sr5-marketplace toggle-handle">
                  <span class="sr5-marketplace spanner-icon fas fa-wrench"></span>
              </span>
          </label>
      </div>
      <input type="text" name="name" value="{{actorName}}" placeholder="Enter shop name">
  </header>
  <figure class="sr5-marketplace actor-image">
    <img src="{{img}}" data-edit="img">
  </figure>
  <!-- Second Row: Description and Image -->
  <div class="sr5-marketplace description-container">
      <label for="sr5-marketplace description">Description:</label>
      <textarea name="system.description.long" class="sr5-marketplace description-edit" disabled>{{description.long}}</textarea>
  </div>

  <!-- Third Row: Form Groups for Numeric Fields -->
  <div class="sr5-marketplace form-group">
      <label for="charisma">Charisma</label>
      <input class="sr5-marketplace input" type="number" name="system.charisma" value="{{system.charisma}}" min="0" max="12" step="1">
  </div>

  <div class="sr5-marketplace form-group">
      <label for="negotiation">Negotiation</label>
      <input class="sr5-marketplace input" type="number" name="system.negotiation" value="{{system.negotiation}}" min="0" max="12" step="1">
  </div>

  <div class="sr5-marketplace form-group">
      <label for="connection">Connection</label>
      <input class="sr5-marketplace input" type="number" name="system.connection" value="{{system.connection}}" min="0" max="6" step="1">
  </div>

  <div class="sr5-marketplace form-group">
      <label for="loyalty">Loyalty</label>
      <input class="sr5-marketplace input" type="number" name="system.loyalty" value="{{system.loyalty}}" min="0" max="6" step="1">
  </div>

  <div class="sr5-marketplace form-group">
      <label>Group</label>
      <input class="sr5-marketplace selector" type="checkbox" name="system.group" {{#if system.group}}checked{{/if}}>
  </div>

  <div class="sr5-marketplace form-group">
      <label>Family</label>
      <input class="sr5-marketplace selector" type="checkbox" name="system.family" {{#if system.family}}checked{{/if}}>
  </div>

  <div class="sr5-marketplace form-group">
      <label>Blackmail</label>
      <input class="sr5-marketplace selector" type="checkbox" name="system.blackmail" {{#if system.blackmail}}checked{{/if}}>
  </div>

  <!-- Items Grid for Sale -->
  <div class="sr5-marketplace items-grid">
      <h3>Items for Sale</h3>
      <div class = "sr5-marketplace item-catalog" id="items-for-sale">
          {{#each items}}
          <div class="item">
              <strong>{{name}}</strong> - Cost: {{system.technology.cost}} ¥
              <button type="button" class="remove-item" data-item-id="{{_id}}">Remove</button>
          </div>
          {{else}}
          <p>No items for sale</p>
          {{/each}}
      </div>
  </div>
</form>
